<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Title of the webpage displayed in the browser tab -->
    <title>ChefByte Inventory</title>
    <style>
        /* Styling for buttons, adding a right margin to separate them visually */
        button {
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <!-- Main header indicating the purpose of the page -->
    <h1>Current Stock</h1>
    
    <!-- Table to display the inventory items -->
    <table id="stockTable">
        <!-- Table header row defining the columns for item details -->
        <tr>
            <th>Item Name</th>
            <th>Quantity</th>
            <th>Expiration Date</th>
            <th>Actions</th>  <!-- Column for action buttons like edit and delete -->
        </tr>
        <!-- Below this row, inventory items will be dynamically added by JavaScript -->
    </table>

    <!-- Subheader for the section to add new inventory items -->
    <h2>Add New Stock Item</h2>
    <!-- Form for adding a new inventory item -->
    <form id="addStockForm">
        <!-- Input field for the item's name -->
        <input type="text" id="itemName" placeholder="Item Name" required>
        <!-- Input field for the item's quantity, must be a number -->
        <input type="number" id="itemQuantity" placeholder="Quantity" required>
        <!-- Input field for the item's expiration date, optional -->
        <input type="date" id="itemExpirationDate" placeholder="Expiration Date">
        <!-- Button to submit the form and add the new item -->
        <button type="submit">Add Stock</button>
    </form>

    <!-- Link to the JavaScript file that handles all dynamic functionalities like adding,
         editing, and deleting items as well as loading existing items into the table -->
    <script src="/static/app.js"></script>
</body>
</html>
