<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ChefByte Inventory</title>
    <style>
        button {
            margin-right: 5px;
        }
        /* Ensuring the video element is visible */
        #barcodeVideo {
            width: 100%;
            height: auto; /* Maintain aspect ratio */
            background-color: #000; /* Visibility aid for video */
        }
        /* Adjusted styling for the barcode scanner container */
        #barcodeScanner {
            display: none;
            width: 100%;
            max-width: 600px; /* Maximum width for scanner area */
            margin: auto; /* Centering the scanner */
        }
    </style>
</head>
<body>
    <h1>Current Stock</h1>
    
    <table id="stockTable">
        <tr>
            <th>Item Name</th>
            <th>Quantity</th>
            <th>Expiration Date</th>
            <th>Actions</th>
        </tr>
        <!-- Inventory items will be added here dynamically -->
    </table>

    <button id="scanBarcode">Scan Barcode</button>

    <div id="barcodeScanner">
        <video id="barcodeVideo" autoplay playsinline></video>
    </div>

    <h2>Add New Stock Item</h2>
    <form id="addStockForm">
        <input type="text" id="itemName" placeholder="Item Name" required>
        <input type="number" id="itemQuantity" placeholder="Quantity" required>
        <input type="date" id="itemExpirationDate" placeholder="Expiration Date">
        <button type="submit">Add Stock</button>
    </form>

    <script src="/static/app.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
</body>
</html>
